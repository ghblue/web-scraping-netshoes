<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netshoes Web Scraper</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -2;
        }

        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(rgba(15, 23, 42, 0.75), rgba(15, 23, 42, 0.85));
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .input-group {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }

        input {
            width: 100%;
            padding: 0.75rem 2.5rem 0.75rem 1rem;
            border-radius: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.6);
            color: var(--text-main);
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .clear-btn {
            position: absolute;
            right: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background 0.2s;
            padding: 0;
            z-index: 2;
        }
        
        .clear-btn:hover {
            background: rgba(239, 68, 68, 0.8);
        }

        button.search-btn {
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 600;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            z-index: 2;
        }

        button.search-btn:hover {
            background: var(--primary-hover);
        }

        button.search-btn:active {
            transform: scale(0.98);
        }

        button.search-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .result-area {
            margin-top: 2rem;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 1rem;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: opacity 0.3s ease;
        }

        .product-image-container {
            width: 100%;
            height: 250px;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 1rem;
        }

        .product-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 0.5rem;
            background-color: transparent;
            mix-blend-mode: normal;
        }

        .product-details {
            padding: 1.5rem;
        }

        .product-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: #10b981; 
            margin-bottom: 1rem;
        }

        .product-description {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
            white-space: pre-wrap;
            max-height: 150px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }
        
        .product-description::-webkit-scrollbar {
            width: 6px;
        }
        .product-description::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
        }
        .product-description::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
        }

        .loader {
            display: none;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 3px solid var(--primary);
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }

        .error-msg {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 1rem;
            border-radius: 0.75rem;
            margin-top: 1rem;
            display: none;
            font-size: 0.95rem;
            text-align: center;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }


        .hire-me-cta {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: bounceIn 1s cubic-bezier(0.36, 0, 0.66, -0.56) forwards;
            animation-delay: 0.5s;
            opacity: 0;
            transform: scale(0.8) translateY(20px);
        }

        .hire-me-cta:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 30px -10px rgba(139, 92, 246, 0.6);
            background: linear-gradient(135deg, #7c3aed, #5b21b6);
        }

        .hire-me-cta span {
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            line-height: 1.3;
        }

        .hire-me-cta span strong {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .cta-icon {
            font-size: 2.2rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hire-me-cta {
                bottom: 1rem;
                right: 1rem;
                left: 1rem;
                justify-content: center;
            }
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); }
            60% { opacity: 1; transform: scale(1.05) translateY(-5px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

    </style>
</head>
<body>


    <video autoplay loop muted playsinline class="video-bg" poster="https://downloadserver-cdn.nelogica.com.br/content/site/nelogica/carrers/video-cover.webp">
        <source src="https://downloadserver-cdn.nelogica.com.br/content/site/nelogica/carrers/banner-video.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>


    <a href="/curriculo.pdf" target="_blank" class="hire-me-cta" aria-label="Abrir e baixar currículo">
        <div class="cta-icon">💼</div>
        <span>
            <strong>Gostou do meu trabalho?</strong>
            Contrate este Dev (Ver Currículo)
        </span>
    </a>

    <div class="container">
        <div class="header">
            <h1>Netshoes Web Scraper - Teste Técnico </h1>
            <p>Insira a URL do produto na Netshoes para extrair os dados e visualizar seu produto.</p>
        </div>

        <div class="input-group">
            <div class="input-wrapper">
                <input type="url" id="urlInput" placeholder="Ex: https://www.netshoes.com.br/p/tenis-..." required>
                <button class="clear-btn" id="clearBtn" aria-label="Limpar Pesquisa" title="Limpar">✕</button>
            </div>
            <button id="scrapeBtn" class="search-btn" onclick="scrape()">Buscar</button>
        </div>

        <div class="loader" id="loader"></div>
        <div class="error-msg" id="errorMsg"></div>

        <div class="result-area" id="resultArea">
            <div class="product-card">
                <div class="product-image-container">
                    <img id="pImage" class="product-image" src="" alt="Product Image">
                </div>
                <div class="product-details">
                    <h2 class="product-title" id="pTitle">Título</h2>
                    <div class="product-price" id="pPrice">R$ 0,00</div>
                    <div class="product-description" id="pDesc">Descrição...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById("urlInput");
        const clearBtn = document.getElementById("clearBtn");
        const resultArea = document.getElementById('resultArea');
        const errorMsg = document.getElementById('errorMsg');


        urlInput.addEventListener("input", function() {
            clearBtn.style.display = urlInput.value.length > 0 ? "flex" : "none";
        });


        urlInput.addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                scrape();
            }
            if (event.key === "Escape") {
                event.preventDefault();
                clearSearch();
            }
        });


        clearBtn.addEventListener("click", clearSearch);

        function clearSearch() {
            urlInput.value = '';
            clearBtn.style.display = "none";
            resultArea.style.display = 'none';
            errorMsg.style.display = 'none';
            urlInput.focus();
        }

        async function scrape() {
            const url = urlInput.value.trim();
            
            if (!url) {
                showError("Por favor, insira uma URL válida.");
                return;
            }

            const btn = document.getElementById('scrapeBtn');
            const loader = document.getElementById('loader');


            btn.disabled = true;
            loader.style.display = 'block';
            resultArea.style.display = 'none';
            errorMsg.style.display = 'none';

            try {
                const response = await fetch(`/api/scrape?url=${encodeURIComponent(url)}`);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Erro ao tentar realizar a busca.');
                }


                document.getElementById('pTitle').textContent = data.title;
                document.getElementById('pPrice').textContent = data.price;
                document.getElementById('pImage').src = data.image;
                document.getElementById('pDesc').textContent = data.description || 'Sem descrição disponível.';

                resultArea.style.display = 'block';

            } catch (err) {
                showError(err.message);
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
        }
    </script>
</body>
</html>
